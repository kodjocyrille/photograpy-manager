<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}" lang="fr">
<head><title>Liens magiques</title></head>
<body>
<section layout:fragment="content">
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
        <h1 class="text-2xl font-bold text-slate-800">Liens magiques</h1>
    </div>

    <!-- Create form -->
    <div class="bg-white rounded-xl border border-slate-200/60 shadow-sm p-5 mb-6" x-data="{showForm:false}">
        <button @click="showForm=!showForm" class="text-sm font-medium text-brand-600 flex items-center gap-2 hover:text-brand-700">
            <i data-lucide="plus-circle" class="w-4 h-4"></i> Créer un lien magique
        </button>
        <form x-show="showForm" x-cloak action="/admin/magic-links" method="post" class="mt-4 grid sm:grid-cols-2 lg:grid-cols-4 gap-3">
            <select name="clientId" required class="px-3 py-2 rounded-xl border border-slate-300 text-sm bg-white">
                <option value="">Client</option>
                <option th:each="c : ${clients}" th:value="${c.id}" th:text="${c.fullName}">Client</option>
            </select>
            <input type="text" name="pinCode" placeholder="PIN (optionnel)" maxlength="6" class="px-3 py-2 rounded-xl border border-slate-300 text-sm">
            <input type="number" name="expirationDays" placeholder="Jours validité" min="1" value="7" class="px-3 py-2 rounded-xl border border-slate-300 text-sm">
            <button type="submit" class="px-4 py-2 bg-brand-600 text-white rounded-xl text-sm font-medium hover:bg-brand-700 transition-colors">Générer</button>
        </form>
    </div>

    <!-- Table -->
    <div class="bg-white rounded-xl border border-slate-200/60 shadow-sm overflow-hidden">
        <table class="w-full text-sm">
            <thead class="bg-slate-50 border-b border-slate-200">
                <tr>
                    <th class="text-left px-4 py-3 font-semibold text-slate-600">Client</th>
                    <th class="text-left px-4 py-3 font-semibold text-slate-600">Token</th>
                    <th class="text-center px-4 py-3 font-semibold text-slate-600">PIN</th>
                    <th class="text-left px-4 py-3 font-semibold text-slate-600 hidden md:table-cell">Expire</th>
                    <th class="text-center px-4 py-3 font-semibold text-slate-600">Statut</th>
                    <th class="text-right px-4 py-3 font-semibold text-slate-600">Actions</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
                <tr th:each="l : ${links}" class="hover:bg-slate-50/50">
                    <td class="px-4 py-3 font-medium text-slate-800" th:text="${l.client.fullName}">Client</td>
                    <td class="px-4 py-3">
                        <code class="text-xs bg-slate-100 px-2 py-1 rounded text-brand-600" th:text="${'/gallery/' + l.token.substring(0,8) + '...'}">Token</code>
                    </td>
                    <td class="px-4 py-3 text-center" th:text="${l.pinCode != null ? '••••' : '—'}">PIN</td>
                    <td class="px-4 py-3 text-slate-500 hidden md:table-cell" th:text="${l.expiresAt != null ? #temporals.format(l.expiresAt, 'dd/MM/yyyy HH:mm') : 'Jamais'}">Date</td>
                    <td class="px-4 py-3 text-center">
                        <span th:if="${l.accessible}" class="inline-flex items-center px-2 py-1 rounded-lg text-xs font-medium bg-emerald-50 text-emerald-700">Actif</span>
                        <span th:unless="${l.accessible}" class="inline-flex items-center px-2 py-1 rounded-lg text-xs font-medium bg-red-50 text-red-700">Expiré/Révoqué</span>
                    </td>
                    <td class="px-4 py-3 text-right">
                        <form th:if="${l.accessible}" th:action="@{/admin/magic-links/{id}/revoke(id=${l.id})}" method="post" class="inline">
                            <button type="submit" class="p-1.5 text-red-400 hover:text-red-600 rounded-lg hover:bg-red-50 transition-colors" title="Révoquer">
                                <i data-lucide="x-circle" class="w-4 h-4"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(links)}">
                    <td colspan="6" class="px-4 py-12 text-center text-slate-400">Aucun lien magique créé</td>
                </tr>
            </tbody>
        </table>
    </div>
</section>
</body>
</html>
