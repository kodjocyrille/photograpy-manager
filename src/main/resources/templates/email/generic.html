<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head><meta charset="UTF-8"></head>
<body style="margin:0;padding:0;font-family:'Helvetica Neue',Arial,sans-serif;background-color:#f1f5f9;">
<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f1f5f9;padding:40px 0;">
    <tr><td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.08);">
            <!-- Header -->
            <tr><td style="background:linear-gradient(135deg,#1e2a5e,#4263eb);padding:32px 40px;text-align:center;">
                <h1 style="margin:0;font-size:24px;font-weight:700;color:#ffffff;letter-spacing:1px;">📷 PHOTOAGENCE</h1>
                <p style="margin:8px 0 0;font-size:12px;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:2px;">Studio Manager</p>
            </td></tr>
            <!-- Body -->
            <tr><td style="padding:40px;">
                <p style="margin:0 0 8px;font-size:14px;color:#94a3b8;">Bonjour,</p>
                <h2 style="margin:0 0 16px;font-size:20px;font-weight:600;color:#1e293b;" th:text="${subject}">Sujet</h2>
                <p th:if="${recipientName}" style="margin:0 0 16px;font-size:15px;color:#475569;">
                    Cher(e) <span th:text="${recipientName}" style="font-weight:600;">Client</span>,
                </p>
                <div style="background:#f8fafc;border-left:4px solid #4263eb;border-radius:8px;padding:20px;margin:24px 0;">
                    <p style="margin:0;font-size:15px;color:#334155;line-height:1.6;" th:text="${message}">Message</p>
                </div>
                <p style="margin:24px 0 0;font-size:13px;color:#94a3b8;line-height:1.5;">
                    Si vous avez des questions, n'hésitez pas à nous contacter.
                </p>
            </td></tr>
            <!-- Footer -->
            <tr><td style="background:#f8fafc;padding:24px 40px;text-align:center;border-top:1px solid #e2e8f0;">
                <p style="margin:0;font-size:12px;color:#94a3b8;">© 2026 PHOTOAGENCE — Tous droits réservés</p>
                <p style="margin:4px 0 0;font-size:11px;color:#cbd5e1;">Cet email a été envoyé automatiquement. Merci de ne pas y répondre.</p>
            </td></tr>
        </table>
    </td></tr>
</table>
</body>
</html>
