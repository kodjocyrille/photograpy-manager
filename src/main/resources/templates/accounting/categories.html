<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}" lang="fr">
<head><title>Catégories comptables</title></head>
<body>
<section layout:fragment="content">
    <div class="max-w-3xl mx-auto">
        <div class="flex items-center gap-3 mb-6">
            <a href="/accounting" class="p-2 text-slate-400 hover:text-slate-600 rounded-lg hover:bg-white transition-colors"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
            <h1 class="text-2xl font-bold text-slate-800">Catégories comptables</h1>
        </div>

        <!-- Add form -->
        <div class="bg-white rounded-xl border border-slate-200/60 shadow-sm p-5 mb-6">
            <form th:action="@{/accounting/categories}" method="post" class="flex flex-col sm:flex-row gap-3">
                <input type="text" name="name" required placeholder="Nom de la catégorie" class="flex-1 px-4 py-2.5 rounded-xl border border-slate-300 text-sm focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 outline-none">
                <select name="type" required class="px-4 py-2.5 rounded-xl border border-slate-300 text-sm bg-white">
                    <option th:each="t : ${categoryTypes}" th:value="${t.name()}" th:text="${t.label}">T</option>
                </select>
                <button type="submit" class="px-6 py-2.5 bg-gradient-to-r from-brand-600 to-brand-700 text-white font-semibold rounded-xl hover:from-brand-700 hover:to-brand-800 text-sm whitespace-nowrap">Ajouter</button>
            </form>
        </div>

        <!-- Categories list -->
        <div class="bg-white rounded-xl border border-slate-200/60 shadow-sm overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-slate-50 border-b border-slate-200">
                    <tr>
                        <th class="text-left px-4 py-3 font-semibold text-slate-600">Nom</th>
                        <th class="text-center px-4 py-3 font-semibold text-slate-600">Type</th>
                        <th class="text-center px-4 py-3 font-semibold text-slate-600">Statut</th>
                        <th class="text-right px-4 py-3 font-semibold text-slate-600">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                    <tr th:each="c : ${categories}" class="hover:bg-slate-50/50">
                        <td class="px-4 py-3 font-medium text-slate-800" th:text="${c.name}">Cat</td>
                        <td class="px-4 py-3 text-center">
                            <span class="inline-flex items-center px-2 py-0.5 rounded-lg text-xs font-medium"
                                  th:text="${c.type.label}"
                                  th:classappend="${c.type.name() == 'REVENUE'} ? 'bg-emerald-50 text-emerald-700' : 'bg-red-50 text-red-700'">T</span>
                        </td>
                        <td class="px-4 py-3 text-center">
                            <span th:if="${c.active}" class="text-emerald-500 text-xs font-medium">Actif</span>
                            <span th:unless="${c.active}" class="text-slate-400 text-xs font-medium">Inactif</span>
                        </td>
                        <td class="px-4 py-3 text-right">
                            <form th:action="@{/accounting/categories/{id}/toggle(id=${c.id})}" method="post" class="inline">
                                <button type="submit" class="px-3 py-1.5 text-xs rounded-lg border transition-colors"
                                        th:classappend="${c.active} ? 'text-red-600 border-red-200 hover:bg-red-50' : 'text-emerald-600 border-emerald-200 hover:bg-emerald-50'"
                                        th:text="${c.active ? 'Désactiver' : 'Activer'}">Toggle</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(categories)}">
                        <td colspan="4" class="px-4 py-12 text-center text-slate-400">Aucune catégorie</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
