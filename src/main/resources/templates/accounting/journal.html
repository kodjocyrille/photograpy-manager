<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}" lang="fr">
<head><title>Journal comptable</title></head>
<body>
<section layout:fragment="content">
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
        <h1 class="text-2xl font-bold text-slate-800">Journal comptable</h1>
        <div class="flex gap-2">
            <a href="/accounting" class="inline-flex items-center gap-2 px-4 py-2.5 bg-white border border-slate-200 text-slate-700 font-medium rounded-xl hover:bg-slate-50 text-sm">
                <i data-lucide="bar-chart-3" class="w-4 h-4"></i> Dashboard
            </a>
            <a href="/accounting/new" class="inline-flex items-center gap-2 px-4 py-2.5 bg-gradient-to-r from-brand-600 to-brand-700 text-white font-semibold rounded-xl hover:from-brand-700 hover:to-brand-800 text-sm shadow-lg shadow-brand-500/25">
                <i data-lucide="plus" class="w-4 h-4"></i> Écriture
            </a>
        </div>
    </div>

    <!-- Filters -->
    <div class="bg-white rounded-xl border border-slate-200/60 shadow-sm p-4 mb-6">
        <form action="/accounting/journal" method="get" class="grid sm:grid-cols-2 lg:grid-cols-5 gap-3 items-end">
            <div>
                <label class="block text-xs font-medium text-slate-500 mb-1">Type</label>
                <select name="type" class="w-full px-3 py-2 rounded-xl border border-slate-300 text-sm bg-white">
                    <option value="">Tous</option>
                    <option th:each="t : ${types}" th:value="${t.name()}" th:text="${t.label}" th:selected="${selectedType != null and selectedType == t}">T</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-500 mb-1">Catégorie</label>
                <select name="categoryId" class="w-full px-3 py-2 rounded-xl border border-slate-300 text-sm bg-white">
                    <option value="">Toutes</option>
                    <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}" th:selected="${selectedCategory != null and selectedCategory == c.id}">C</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-500 mb-1">Du</label>
                <input type="date" name="from" th:value="${dateFrom}" class="w-full px-3 py-2 rounded-xl border border-slate-300 text-sm">
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-500 mb-1">Au</label>
                <input type="date" name="to" th:value="${dateTo}" class="w-full px-3 py-2 rounded-xl border border-slate-300 text-sm">
            </div>
            <div class="flex gap-2">
                <button type="submit" class="flex-1 px-4 py-2 bg-brand-600 text-white rounded-xl text-sm font-medium hover:bg-brand-700">Filtrer</button>
                <a th:href="@{/accounting/export(type=${selectedType}, categoryId=${selectedCategory}, from=${dateFrom}, to=${dateTo})}"
                   class="px-3 py-2 bg-emerald-600 text-white rounded-xl text-sm font-medium hover:bg-emerald-700 flex items-center gap-1" title="Export CSV">
                    <i data-lucide="download" class="w-4 h-4"></i>
                </a>
            </div>
        </form>
    </div>

    <!-- Table -->
    <div class="bg-white rounded-xl border border-slate-200/60 shadow-sm overflow-hidden">
        <table class="w-full text-sm">
            <thead class="bg-slate-50 border-b border-slate-200">
                <tr>
                    <th class="text-left px-4 py-3 font-semibold text-slate-600">Date</th>
                    <th class="text-center px-4 py-3 font-semibold text-slate-600">Type</th>
                    <th class="text-left px-4 py-3 font-semibold text-slate-600">Libellé</th>
                    <th class="text-left px-4 py-3 font-semibold text-slate-600 hidden md:table-cell">Catégorie</th>
                    <th class="text-right px-4 py-3 font-semibold text-slate-600">Montant</th>
                    <th class="text-right px-4 py-3 font-semibold text-slate-600">Actions</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
                <tr th:each="e : ${entries}" class="hover:bg-slate-50/50">
                    <td class="px-4 py-3 text-slate-600" th:text="${#temporals.format(e.entryDate, 'dd/MM/yyyy')}">Date</td>
                    <td class="px-4 py-3 text-center">
                        <span class="inline-flex items-center px-2 py-0.5 rounded-lg text-xs font-medium"
                              th:text="${e.type.label}"
                              th:classappend="${e.type.name() == 'CREDIT'} ? 'bg-emerald-50 text-emerald-700' : 'bg-red-50 text-red-700'">T</span>
                    </td>
                    <td class="px-4 py-3 font-medium text-slate-800" th:text="${e.label}">Label</td>
                    <td class="px-4 py-3 text-slate-500 hidden md:table-cell" th:text="${e.category != null ? e.category.name : '—'}">Cat</td>
                    <td class="px-4 py-3 text-right font-semibold"
                        th:classappend="${e.type.name() == 'CREDIT'} ? 'text-emerald-600' : 'text-red-600'"
                        th:text="${(e.type.name() == 'CREDIT' ? '+' : '-') + #numbers.formatDecimal(e.amount, 1, 'COMMA', 0, 'POINT') + ' FCFA'}">0</td>
                    <td class="px-4 py-3 text-right">
                        <form th:action="@{/accounting/{id}/delete(id=${e.id})}" method="post" class="inline">
                            <button type="submit" onclick="return confirm('Supprimer cette écriture ?')" class="p-1.5 text-red-400 hover:text-red-600 rounded-lg hover:bg-red-50 transition-colors" title="Supprimer">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(entries)}">
                    <td colspan="6" class="px-4 py-12 text-center text-slate-400">Aucune écriture comptable</td>
                </tr>
            </tbody>
        </table>
    </div>
</section>
</body>
</html>
