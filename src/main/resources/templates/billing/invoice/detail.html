<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}" lang="fr">
<head><title th:text="${pageTitle}">Facture</title></head>
<body>
<section layout:fragment="content">
    <div class="max-w-4xl mx-auto">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
            <div class="flex items-center gap-3">
                <a href="/billing/invoices" class="p-2 text-slate-400 hover:text-slate-600 rounded-lg hover:bg-white transition-colors"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
                <div>
                    <h1 class="text-2xl font-bold text-slate-800" th:text="${invoice.invoiceNumber}">FAC</h1>
                    <a th:href="@{/clients/{id}(id=${invoice.client.id})}" class="text-sm text-slate-400 hover:text-brand-600" th:text="${invoice.client.fullName}">Client</a>
                </div>
            <span class="inline-flex items-center px-3 py-1.5 rounded-lg text-sm font-medium"
                      th:text="${invoice.status.label}"
                      th:classappend="${invoice.status.name() == 'PAID' ? 'bg-emerald-50 text-emerald-700' : (invoice.status.name() == 'PARTIALLY_PAID' ? 'bg-amber-50 text-amber-700' : (invoice.status.name() == 'OVERDUE' ? 'bg-red-50 text-red-700' : (invoice.status.name() == 'SENT' ? 'bg-blue-50 text-blue-700' : 'bg-slate-100 text-slate-600')))}">S</span>
        </div>

        <div class="grid md:grid-cols-3 gap-6">
            <!-- Lines + payments -->
            <div class="md:col-span-2 space-y-6">
                <!-- Lines -->
                <div class="bg-white rounded-xl border border-slate-200/60 shadow-sm">
                    <div class="px-5 py-4 border-b border-slate-100"><h3 class="font-semibold text-slate-800">Lignes de la facture</h3></div>
                    <table class="w-full text-sm">
                        <thead class="bg-slate-50 border-b border-slate-200">
                            <tr>
                                <th class="text-left px-4 py-2 text-slate-600">Description</th>
                                <th class="text-center px-4 py-2 text-slate-600">Qté</th>
                                <th class="text-right px-4 py-2 text-slate-600">Prix unit.</th>
                                <th class="text-right px-4 py-2 text-slate-600">Total</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100">
                            <tr th:each="line : ${invoice.lines}">
                                <td class="px-4 py-3" th:text="${line.description}">Desc</td>
                                <td class="px-4 py-3 text-center" th:text="${line.quantity}">1</td>
                                <td class="px-4 py-3 text-right" th:text="${#numbers.formatDecimal(line.unitPrice, 0, 'COMMA', 0, 'POINT')} + ' FCFA'">0</td>
                                <td class="px-4 py-3 text-right font-medium" th:text="${#numbers.formatDecimal(line.lineTotal, 0, 'COMMA', 0, 'POINT')} + ' FCFA'">0</td>
                            </tr>
                        </tbody>
                    </table>
                    <!-- Summary -->
                    <div class="border-t border-slate-200 px-5 py-4 space-y-2 text-sm">
                        <div class="flex justify-between"><span class="text-slate-500">Total</span><span class="font-bold text-lg" th:text="${#numbers.formatDecimal(invoice.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' FCFA'">0</span></div>
                        <div class="flex justify-between text-emerald-600"><span>Payé</span><span class="font-semibold" th:text="${#numbers.formatDecimal(invoice.amountPaid, 0, 'COMMA', 0, 'POINT')} + ' FCFA'">0</span></div>
                        <div class="flex justify-between border-t border-slate-100 pt-2"
                             th:classappend="${invoice.remainingAmount.compareTo(T(java.math.BigDecimal).ZERO) > 0} ? 'text-red-600' : 'text-emerald-600'">
                            <span class="font-semibold">Reste dû</span>
                            <span class="font-bold text-lg" th:text="${#numbers.formatDecimal(invoice.remainingAmount, 0, 'COMMA', 0, 'POINT')} + ' FCFA'">0</span>
                        </div>
                    </div>
                </div>

                <!-- Payments history -->
                <div class="bg-white rounded-xl border border-slate-200/60 shadow-sm">
                    <div class="px-5 py-4 border-b border-slate-100"><h3 class="font-semibold text-slate-800 flex items-center gap-2"><i data-lucide="banknote" class="w-4 h-4 text-emerald-500"></i> Paiements</h3></div>
                    <div class="divide-y divide-slate-100">
                        <div th:each="p : ${invoice.payments}" class="flex items-center justify-between px-5 py-3">
                            <div>
                                <p class="text-sm font-medium text-slate-800" th:text="${p.method.label}">Mode</p>
                                <p class="text-xs text-slate-400" th:text="${#temporals.format(p.paymentDate, 'dd/MM/yyyy')}">Date</p>
                            </div>
                            <span class="font-semibold text-emerald-600" th:text="'+' + ${#numbers.formatDecimal(p.amount, 0, 'COMMA', 0, 'POINT')} + ' FCFA'">+0</span>
                        </div>
                        <div th:if="${#lists.isEmpty(invoice.payments)}" class="px-5 py-6 text-center text-slate-400 text-sm">Aucun paiement enregistré</div>
                    </div>
                </div>
            </div>

            <!-- Sidebar: add payment + status -->
            <div class="space-y-6">
                <!-- Add payment form -->
                <div th:if="${invoice.status.name() != 'PAID'}" class="bg-white rounded-xl border border-slate-200/60 shadow-sm p-5">
                    <h3 class="font-semibold text-slate-800 mb-4 flex items-center gap-2"><i data-lucide="plus-circle" class="w-4 h-4 text-brand-500"></i> Enregistrer un paiement</h3>
                    <form th:action="@{/billing/invoices/{id}/payments(id=${invoice.id})}" method="post" th:object="${paymentForm}" class="space-y-3">
                        <div>
                            <label class="block text-xs font-medium text-slate-600 mb-1">Montant (FCFA) *</label>
                            <input type="number" th:field="*{amount}" min="1" step="1000" required th:placeholder="${'Max: ' + #numbers.formatDecimal(invoice.remainingAmount, 0, 'COMMA', 0, 'POINT')}"
                                   class="w-full px-3 py-2 rounded-xl border border-slate-300 text-sm focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 outline-none">
                            <p th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}" class="text-red-500 text-xs mt-1"></p>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-600 mb-1">Mode de paiement *</label>
                            <select th:field="*{method}" required class="w-full px-3 py-2 rounded-xl border border-slate-300 text-sm bg-white focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 outline-none">
                                <option value="">— Sélectionner —</option>
                                <option th:each="m : ${paymentMethods}" th:value="${m.name()}" th:text="${m.label}">Mode</option>
                            </select>
                            <p th:if="${#fields.hasErrors('method')}" th:errors="*{method}" class="text-red-500 text-xs mt-1"></p>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-600 mb-1">Date *</label>
                            <input type="date" th:field="*{paymentDate}" required class="w-full px-3 py-2 rounded-xl border border-slate-300 text-sm focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 outline-none">
                            <p th:if="${#fields.hasErrors('paymentDate')}" th:errors="*{paymentDate}" class="text-red-500 text-xs mt-1"></p>
                        </div>
                        <button type="submit" class="w-full py-2.5 bg-emerald-600 text-white font-semibold rounded-xl hover:bg-emerald-700 transition-all text-sm">Enregistrer le paiement</button>
                    </form>
                </div>

                <!-- Info -->
                <div class="bg-white rounded-xl border border-slate-200/60 shadow-sm p-5">
                    <h3 class="font-semibold text-slate-800 mb-3">Infos</h3>
                    <dl class="space-y-2 text-sm">
                        <div th:if="${invoice.quote != null}"><dt class="text-slate-400 text-xs">Devis</dt>
                            <dd><a th:href="@{/billing/quotes/{id}(id=${invoice.quote.id})}" class="text-brand-600 hover:underline" th:text="${invoice.quote.quoteNumber}">DEV</a></dd>
                        </div>
                        <div><dt class="text-slate-400 text-xs">Échéance</dt><dd th:text="${invoice.dueDate != null ? #temporals.format(invoice.dueDate, 'dd/MM/yyyy') : '-'}">Date</dd></div>
                        <div><dt class="text-slate-400 text-xs">Créé le</dt><dd th:text="${#temporals.format(invoice.createdAt, 'dd/MM/yyyy HH:mm')}">Date</dd></div>
                    </dl>
                    <div class="mt-4 pt-3 border-t border-slate-100">
                        <p class="text-xs text-slate-400 mb-2">Changer le statut :</p>
                        <div class="space-y-1">
                            <form th:each="s : ${statuses}" th:if="${s != invoice.status}"
                                  th:action="@{/billing/invoices/{id}/status(id=${invoice.id})}" method="post">
                                <input type="hidden" name="status" th:value="${s.name()}">
                                <button type="submit" class="w-full text-left px-3 py-1.5 rounded-lg text-xs hover:bg-slate-50 transition-colors" th:text="${s.label}">S</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
