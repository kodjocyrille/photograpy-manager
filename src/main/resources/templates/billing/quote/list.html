<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}" lang="fr">
<head><title>Devis</title></head>
<body>
<section layout:fragment="content">
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
        <h1 class="text-2xl font-bold text-slate-800">Devis</h1>
        <a href="/billing/quotes/new" class="inline-flex items-center gap-2 px-4 py-2.5 bg-gradient-to-r from-brand-600 to-brand-700 text-white font-semibold rounded-xl hover:from-brand-700 hover:to-brand-800 transition-all shadow-lg shadow-brand-500/25 text-sm">
            <i data-lucide="file-plus" class="w-4 h-4"></i> Nouveau devis
        </a>
    </div>

    <!-- Filters -->
    <div class="flex gap-2 mb-4 flex-wrap">
        <a href="/billing/quotes" class="px-3 py-1.5 rounded-lg text-xs font-medium transition-colors"
           th:classappend="${selectedStatus == null} ? 'bg-brand-600 text-white' : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50'">Tous</a>
        <a th:each="s : ${statuses}" th:href="@{/billing/quotes(status=${s.name()})}"
           class="px-3 py-1.5 rounded-lg text-xs font-medium transition-colors"
           th:classappend="${s == selectedStatus} ? 'bg-brand-600 text-white' : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50'"
           th:text="${s.label}">Status</a>
    </div>

    <div class="bg-white rounded-xl border border-slate-200/60 shadow-sm overflow-hidden">
        <table class="w-full text-sm">
            <thead class="bg-slate-50 border-b border-slate-200">
                <tr>
                    <th class="text-left px-4 py-3 font-semibold text-slate-600">N° Devis</th>
                    <th class="text-left px-4 py-3 font-semibold text-slate-600">Client</th>
                    <th class="text-right px-4 py-3 font-semibold text-slate-600">Montant</th>
                    <th class="text-center px-4 py-3 font-semibold text-slate-600">Statut</th>
                    <th class="text-left px-4 py-3 font-semibold text-slate-600 hidden md:table-cell">Valide jusqu'au</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
                <tr th:each="q : ${quotes}" class="hover:bg-slate-50/50 transition-colors cursor-pointer" th:onclick="'Turbo.visit(\'/billing/quotes/' + ${q.id} + '\')'">
                    <td class="px-4 py-3 font-medium text-brand-600" th:text="${q.quoteNumber}">DEV</td>
                    <td class="px-4 py-3 text-slate-800" th:text="${q.client.fullName}">Client</td>
                    <td class="px-4 py-3 text-right font-semibold" th:text="${#numbers.formatDecimal(q.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' FCFA'">0</td>
                    <td class="px-4 py-3 text-center">
                        <span class="inline-flex items-center px-2.5 py-1 rounded-lg text-xs font-medium"
                              th:text="${q.status.label}"
                              th:classappend="${q.status.name() == 'DRAFT' ? 'bg-slate-100 text-slate-600' : (q.status.name() == 'SENT' ? 'bg-blue-50 text-blue-700' : (q.status.name() == 'ACCEPTED' ? 'bg-emerald-50 text-emerald-700' : 'bg-red-50 text-red-700'))}">Statut</span>
                    </td>
                    <td class="px-4 py-3 text-slate-500 hidden md:table-cell" th:text="${q.validUntil != null ? #temporals.format(q.validUntil, 'dd/MM/yyyy') : '-'}">Date</td>
                </tr>
                <tr th:if="${#lists.isEmpty(quotes)}">
                    <td colspan="5" class="px-4 py-12 text-center text-slate-400">
                        <i data-lucide="file-text" class="w-10 h-10 mx-auto mb-3 opacity-40"></i>
                        <p>Aucun devis</p>
                        <a href="/billing/quotes/new" class="text-brand-600 text-sm hover:underline mt-1 inline-block">Créer un devis</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</section>
</body>
</html>
