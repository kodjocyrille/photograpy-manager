<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie — PHOTOAGENCE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Poppins',sans-serif}</style>
</head>
<body class="bg-slate-950 text-white min-h-screen">
    <div class="max-w-6xl mx-auto px-4 py-8">
        <div class="text-center mb-10">
            <div class="w-14 h-14 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-indigo-500/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><circle cx="12" cy="13" r="3"/></svg>
            </div>
            <h1 class="text-3xl font-bold mb-2">Galerie Photo</h1>
            <p class="text-slate-400" th:text="'Pour ' + ${clientName}">Client</p>
        </div>

        <div th:if="${#lists.isEmpty(link.assets)}" class="text-center py-20">
            <p class="text-slate-500 text-lg">Aucune photo dans cette galerie pour le moment.</p>
            <p class="text-sm text-slate-600 mt-2">Les photos seront ajoutées bientôt.</p>
        </div>

        <div th:unless="${#lists.isEmpty(link.assets)}" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
            <div th:each="asset : ${link.assets}" class="aspect-square rounded-xl overflow-hidden bg-slate-800 group cursor-pointer relative">
                <img th:src="'#'" th:alt="${asset.fileName}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
                <div class="absolute inset-0 bg-black/0 group-hover:bg-black/20 transition-colors flex items-end">
                    <p class="text-xs text-white/80 p-2 opacity-0 group-hover:opacity-100 transition-opacity" th:text="${asset.fileName}">filename</p>
                </div>
            </div>
        </div>

        <div class="text-center mt-12 pt-6 border-t border-slate-800">
            <p class="text-xs text-slate-600">PHOTOAGENCE — Galerie sécurisée</p>
            <p class="text-xs text-slate-700 mt-1" th:if="${link.expiresAt != null}" th:text="'Expire le ' + ${#temporals.format(link.expiresAt, 'dd/MM/yyyy')}">Expiration</p>
        </div>
    </div>
</body>
</html>
