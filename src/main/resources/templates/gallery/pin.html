<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code PIN — Galerie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Poppins',sans-serif}</style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center">
    <div class="max-w-sm w-full mx-4">
        <div class="text-center mb-8">
            <div class="w-14 h-14 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-indigo-500/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            </div>
            <h1 class="text-xl font-bold mb-1">Galerie protégée</h1>
            <p class="text-sm text-slate-400">Entrez le code PIN pour accéder à la galerie</p>
        </div>
        <form th:action="@{/gallery/{token}(token=${token})}" method="get" class="space-y-4">
            <input type="text" name="pin" placeholder="Code PIN" maxlength="6" required autofocus
                   class="w-full px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 text-center text-2xl tracking-[0.5em] font-mono text-white placeholder-slate-600 focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 outline-none">
            <p th:if="${pinError}" class="text-red-400 text-sm text-center" th:text="${pinError}">Erreur</p>
            <button type="submit" class="w-full py-3 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold rounded-xl hover:from-indigo-700 hover:to-purple-700 transition-all shadow-lg shadow-indigo-500/30">Accéder</button>
        </form>
    </div>
</body>
</html>
