<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}" lang="fr">
<head>
    <title th:text="${pageTitle}">Client</title>
</head>
<body>
<section layout:fragment="content">
    <div class="max-w-3xl mx-auto">
        <!-- Header -->
        <div class="flex items-center gap-3 mb-6">
            <a href="/clients" class="p-2 text-slate-400 hover:text-slate-600 rounded-lg hover:bg-white transition-colors">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </a>
            <h1 class="text-2xl font-bold text-slate-800" th:text="${pageTitle}">Formulaire</h1>
        </div>

        <div class="bg-white rounded-xl border border-slate-200/60 shadow-sm p-6"
             x-data="{
                emailStatus: ''
             }">
            <form th:action="${clientForm.id != null} ? @{/clients/{id}(id=${clientForm.id})} : @{/clients}"
                  method="post" th:object="${clientForm}" class="space-y-5">

                <div class="grid sm:grid-cols-2 gap-4">
                    <!-- Nom complet -->
                    <div>
                        <label for="fullName" class="block text-sm font-medium text-slate-700 mb-1.5">Nom complet *</label>
                        <input type="text" id="fullName" th:field="*{fullName}"
                               class="w-full px-4 py-2.5 rounded-xl border border-slate-300 text-sm focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 outline-none"
                               placeholder="Nom et prénom du client">
                        <p th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" class="text-red-500 text-xs mt-1"></p>
                    </div>

                    <!-- Téléphone -->
                    <div>
                        <label for="phone" class="block text-sm font-medium text-slate-700 mb-1.5">Téléphone *</label>
                        <input type="tel" id="phone" th:field="*{phone}"
                               class="w-full px-4 py-2.5 rounded-xl border border-slate-300 text-sm focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 outline-none"
                               placeholder="+228 XX XX XX XX">
                        <p th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" class="text-red-500 text-xs mt-1"></p>
                    </div>
                </div>

                <!-- Email avec détection doublon -->
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-700 mb-1.5">Email *</label>
                    <input type="email" id="email" th:field="*{email}"
                           class="w-full px-4 py-2.5 rounded-xl border text-sm focus:ring-2 focus:ring-brand-500/20 outline-none"
                           :class="emailStatus==='exists' ? 'border-red-400 focus:border-red-500' : 'border-slate-300 focus:border-brand-500'"
                           placeholder="client@email.com"
                           @input.debounce.500ms="fetch('/clients/check-email?email='+$el.value+'&excludeId=[[${clientForm.id}]]').then(r=>r.text()).then(s=>emailStatus=s)">
                    <p x-show="emailStatus==='exists'" class="text-red-500 text-xs mt-1">⚠️ Un client avec cet email existe déjà</p>
                    <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-red-500 text-xs mt-1"></p>
                </div>

                <div class="grid sm:grid-cols-2 gap-4">
                    <!-- Type de prestation -->
                    <div>
                        <label for="serviceType" class="block text-sm font-medium text-slate-700 mb-1.5">Type de prestation *</label>
                        <select id="serviceType" th:field="*{serviceType}"
                                class="w-full px-4 py-2.5 rounded-xl border border-slate-300 text-sm bg-white focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 outline-none">
                            <option value="">— Sélectionner —</option>
                            <option th:each="t : ${eventTypes}" th:value="${t.name()}" th:text="${t.label}">Type</option>
                        </select>
                        <p th:if="${#fields.hasErrors('serviceType')}" th:errors="*{serviceType}" class="text-red-500 text-xs mt-1"></p>
                    </div>

                    <!-- Date événement -->
                    <div>
                        <label for="eventDate" class="block text-sm font-medium text-slate-700 mb-1.5">Date de l'événement *</label>
                        <input type="date" id="eventDate" th:field="*{eventDate}"
                               class="w-full px-4 py-2.5 rounded-xl border border-slate-300 text-sm focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 outline-none">
                        <p th:if="${#fields.hasErrors('eventDate')}" th:errors="*{eventDate}" class="text-red-500 text-xs mt-1"></p>
                    </div>
                </div>

                <!-- Submit -->
                <div class="flex gap-3 pt-2">
                    <button type="submit"
                            class="flex-1 py-2.5 px-4 bg-gradient-to-r from-brand-600 to-brand-700 text-white font-semibold rounded-xl hover:from-brand-700 hover:to-brand-800 transition-all shadow-lg shadow-brand-500/25 text-sm">
                        <span th:text="${clientForm.id != null} ? 'Mettre à jour' : 'Créer le client'">Enregistrer</span>
                    </button>
                    <a href="/clients" class="px-6 py-2.5 bg-white text-slate-700 font-medium rounded-xl border border-slate-300 hover:bg-slate-50 transition-all text-sm text-center">
                        Annuler
                    </a>
                </div>
            </form>
        </div>
    </div>
</section>
</body>
</html>
