<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}" lang="fr">
<head><title th:text="${pageTitle}">Dossier</title></head>
<body>
<section layout:fragment="content">
    <div class="max-w-4xl mx-auto">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
            <div class="flex items-center gap-3">
                <a href="/workspace" class="p-2 text-slate-400 hover:text-slate-600 rounded-lg hover:bg-white transition-colors"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
                <div>
                    <h1 class="text-2xl font-bold text-slate-800" th:text="${dossier.dossierCode}">DOS</h1>
                    <a th:href="@{/clients/{id}(id=${dossier.client.id})}" class="text-sm text-slate-400 hover:text-brand-600" th:text="${dossier.client.fullName}">Client</a>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <span class="inline-flex items-center px-3 py-1.5 rounded-lg text-sm font-medium"
                      th:text="${dossier.priority.label}"
                      th:classappend="${dossier.priority.name() == 'VIP' ? 'bg-purple-100 text-purple-700' : (dossier.priority.name() == 'URGENT' ? 'bg-red-100 text-red-700' : 'bg-slate-100 text-slate-600')}">P</span>
                <span class="inline-flex items-center px-3 py-1.5 rounded-lg text-sm font-medium"
                      th:text="${dossier.status.label}"
                      th:classappend="${dossier.status.name() == 'COMPLETED' ? 'bg-emerald-50 text-emerald-700' : (dossier.status.name() == 'RETOUCHING' ? 'bg-blue-50 text-blue-700' : (dossier.status.name() == 'AWAITING_VALIDATION' ? 'bg-amber-50 text-amber-700' : (dossier.status.name() == 'CORRECTIONS_REQUESTED' ? 'bg-red-50 text-red-700' : 'bg-slate-100 text-slate-600')))}">S</span>
            </div>
        </div>

        <div class="grid md:grid-cols-3 gap-6">
            <!-- Main content -->
            <div class="md:col-span-2 space-y-6">
                <!-- Info -->
                <div class="bg-white rounded-xl border border-slate-200/60 shadow-sm p-5">
                    <h3 class="font-semibold text-slate-800 mb-3">Informations</h3>
                    <div class="grid grid-cols-2 gap-4 text-sm">
                        <div><p class="text-slate-400 text-xs">Type prestation</p><p class="font-medium" th:text="${dossier.serviceType.label}">Type</p></div>
                        <div><p class="text-slate-400 text-xs">Date séance</p><p class="font-medium" th:text="${dossier.sessionDate != null ? #temporals.format(dossier.sessionDate, 'dd/MM/yyyy') : 'Non définie'}">Date</p></div>
                        <div><p class="text-slate-400 text-xs">Photographe</p><p class="font-medium" th:text="${dossier.photographer != null ? dossier.photographer.fullName : 'Non assigné'}">Photo</p></div>
                        <div><p class="text-slate-400 text-xs">Créé le</p><p class="font-medium" th:text="${#temporals.format(dossier.createdAt, 'dd/MM/yyyy HH:mm')}">Date</p></div>
                    </div>
                </div>

                <!-- Comments -->
                <div class="bg-white rounded-xl border border-slate-200/60 shadow-sm">
                    <div class="px-5 py-4 border-b border-slate-100">
                        <h3 class="font-semibold text-slate-800 flex items-center gap-2"><i data-lucide="message-circle" class="w-4 h-4 text-brand-500"></i> Commentaires</h3>
                    </div>
                    <div class="p-5 space-y-4">
                        <!-- Add comment -->
                        <form th:action="@{/workspace/{id}/comments(id=${dossier.id})}" method="post" class="flex gap-2">
                            <input type="text" name="content" placeholder="Ajouter un commentaire..." required
                                   class="flex-1 px-4 py-2 rounded-xl border border-slate-300 text-sm focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 outline-none">
                            <button type="submit" class="px-4 py-2 bg-brand-600 text-white rounded-xl text-sm font-medium hover:bg-brand-700">Envoyer</button>
                        </form>
                        <!-- Comments list -->
                        <div th:each="c : ${dossier.comments}" class="flex gap-3">
                            <div class="w-8 h-8 rounded-full bg-brand-100 flex items-center justify-center flex-shrink-0">
                                <i data-lucide="user" class="w-4 h-4 text-brand-600"></i>
                            </div>
                            <div class="flex-1 bg-slate-50 rounded-xl p-3">
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="text-sm font-medium text-slate-800" th:text="${c.author.fullName}">Auteur</span>
                                    <span class="text-xs text-slate-400" th:text="${#temporals.format(c.createdAt, 'dd/MM HH:mm')}">Date</span>
                                </div>
                                <p class="text-sm text-slate-600" th:text="${c.content}">Contenu</p>
                            </div>
                        </div>
                        <div th:if="${#lists.isEmpty(dossier.comments)}" class="text-center py-4 text-slate-400 text-sm">Aucun commentaire</div>
                    </div>
                </div>

                <!-- Status History -->
                <div class="bg-white rounded-xl border border-slate-200/60 shadow-sm">
                    <div class="px-5 py-4 border-b border-slate-100">
                        <h3 class="font-semibold text-slate-800 flex items-center gap-2"><i data-lucide="history" class="w-4 h-4 text-slate-400"></i> Historique</h3>
                    </div>
                    <div class="divide-y divide-slate-100">
                        <div th:each="h : ${dossier.statusHistory}" class="px-5 py-3 flex items-center gap-3 text-sm">
                            <span class="text-xs text-slate-400" th:text="${#temporals.format(h.changedAt, 'dd/MM HH:mm')}">Date</span>
                            <span class="text-slate-500" th:text="${h.fromStatus.label}">De</span>
                            <i data-lucide="arrow-right" class="w-3 h-3 text-slate-300"></i>
                            <span class="font-medium text-slate-800" th:text="${h.toStatus.label}">Vers</span>
                            <span th:if="${h.changedBy != null}" class="text-xs text-slate-400" th:text="'par ' + ${h.changedBy.fullName}">par</span>
                        </div>
                        <div th:if="${#lists.isEmpty(dossier.statusHistory)}" class="px-5 py-6 text-center text-slate-400 text-sm">Aucun changement de statut</div>
                    </div>
                </div>
            </div>

            <!-- Sidebar -->
            <div class="space-y-6">
                <!-- Status change -->
                <div class="bg-white rounded-xl border border-slate-200/60 shadow-sm p-5">
                    <h3 class="font-semibold text-slate-800 mb-3">Changer le statut</h3>
                    <div class="space-y-2">
                        <form th:each="s : ${statuses}" th:if="${s != dossier.status}"
                              th:action="@{/workspace/{id}/status(id=${dossier.id})}" method="post">
                            <input type="hidden" name="status" th:value="${s.name()}">
                            <button type="submit" class="w-full text-left px-3 py-2 rounded-lg text-sm hover:bg-slate-50 transition-colors flex items-center gap-2">
                                <span class="w-2 h-2 rounded-full"
                                      th:classappend="${s.name() == 'COMPLETED' ? 'bg-emerald-500' : (s.name() == 'RETOUCHING' ? 'bg-blue-500' : (s.name() == 'AWAITING_VALIDATION' ? 'bg-amber-500' : (s.name() == 'CORRECTIONS_REQUESTED' ? 'bg-red-500' : 'bg-slate-400')))}"></span>
                                <span th:text="${s.label}">S</span>
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Move column -->
                <div class="bg-white rounded-xl border border-slate-200/60 shadow-sm p-5">
                    <h3 class="font-semibold text-slate-800 mb-3">Colonne Kanban</h3>
                    <p class="text-sm text-slate-500 mb-2">Actuellement : <span class="font-medium" th:text="${dossier.column.label}">Col</span></p>
                    <form th:if="${dossier.column.name() == 'TO_PROCESS'}" th:action="@{/workspace/{id}/column(id=${dossier.id})}" method="post">
                        <input type="hidden" name="column" value="DONE">
                        <button type="submit" class="w-full py-2 bg-emerald-600 text-white rounded-xl text-sm font-medium hover:bg-emerald-700">Déplacer vers Terminé</button>
                    </form>
                    <form th:if="${dossier.column.name() == 'DONE'}" th:action="@{/workspace/{id}/column(id=${dossier.id})}" method="post">
                        <input type="hidden" name="column" value="TO_PROCESS">
                        <button type="submit" class="w-full py-2 bg-amber-600 text-white rounded-xl text-sm font-medium hover:bg-amber-700">Remettre à traiter</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
