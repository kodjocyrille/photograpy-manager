<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}" lang="fr">
<head><title>Nouveau dossier</title></head>
<body>
<section layout:fragment="content">
    <div class="max-w-2xl mx-auto">
        <div class="flex items-center gap-3 mb-6">
            <a href="/workspace" class="p-2 text-slate-400 hover:text-slate-600 rounded-lg hover:bg-white transition-colors"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
            <h1 class="text-2xl font-bold text-slate-800">Nouveau dossier</h1>
        </div>
        <div class="bg-white rounded-xl border border-slate-200/60 shadow-sm p-6">
            <form action="/workspace" method="post" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Client *</label>
                    <select name="clientId" required class="w-full px-4 py-2.5 rounded-xl border border-slate-300 text-sm bg-white focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 outline-none">
                        <option value="">— Sélectionner —</option>
                        <option th:each="c : ${clients}" th:value="${c.id}" th:text="${c.fullName}">Client</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Type de prestation *</label>
                    <select name="serviceType" required class="w-full px-4 py-2.5 rounded-xl border border-slate-300 text-sm bg-white focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 outline-none">
                        <option th:each="t : ${eventTypes}" th:value="${t.name()}" th:text="${t.label}">Type</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Date de séance</label>
                    <input type="date" name="sessionDate" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 text-sm focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Photographe</label>
                    <select name="photographerId" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 text-sm bg-white focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 outline-none">
                        <option value="">— Non assigné —</option>
                        <option th:each="u : ${photographers}" th:value="${u.id}" th:text="${u.fullName}">Photographe</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Priorité</label>
                    <select name="priority" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 text-sm bg-white focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 outline-none">
                        <option th:each="p : ${priorities}" th:value="${p.name()}" th:text="${p.label}" th:selected="${p.name() == 'NORMAL'}">P</option>
                    </select>
                </div>
                <button type="submit" class="w-full py-2.5 bg-gradient-to-r from-brand-600 to-brand-700 text-white font-semibold rounded-xl hover:from-brand-700 hover:to-brand-800 transition-all shadow-lg shadow-brand-500/25 text-sm">Créer le dossier</button>
            </form>
        </div>
    </div>
</section>
</body>
</html>
