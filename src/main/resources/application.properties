
spring.application.name=photoagence


# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Flyway (désactivé en dev, activé en prod) ---
spring.flyway.enabled=false

# --- Thymeleaf ---
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# --- Upload fichiers ---
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=200MB

# --- Mail (SMTP) ---
spring.mail.host=${MAIL_HOST:smtp.example.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- Stockage S3 / MinIO ---
storage.s3.endpoint=${S3_ENDPOINT:http://localhost:9000}
storage.s3.access-key=${S3_ACCESS_KEY:minioadmin}
storage.s3.secret-key=${S3_SECRET_KEY:minioadmin}
storage.s3.bucket=${S3_BUCKET:photoagence-assets}
storage.s3.region=${S3_REGION:eu-west-3}

# --- Application PHOTOAGENCE ---
photoagence.magic-link.default-expiry-days=30
photoagence.magic-link.base-url=${APP_BASE_URL:http://localhost:8080}
photoagence.currency=FCFA

# --- Serveur ---
server.port=8080

# --- Logging ---
logging.level.com.giovanni.photograpy_manager=DEBUG
logging.level.org.springframework.security=DEBUG

